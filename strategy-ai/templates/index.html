<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curling Strategy Annotation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-meta {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 8px;
        }
        .badge-vision {
            background: #4CAF50;
        }
        .badge-strategic {
            background: #FF9800;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥌 Curling Strategy Annotation</h1>
        <h2>Mark strategic moments for AI training</h2>

        {% if transcripts %}
            {% for transcript in transcripts %}
                <div class="card" onclick="window.location='/annotate/{{ transcript }}'">
                    <div class="card-title">{{ transcript }}</div>
                    <div class="card-meta">
                        <span class="badge badge-vision">Vision Enriched</span>
                        <span class="badge badge-strategic" id="stats-{{ transcript }}">Loading...</span>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <div class="empty-state-icon">📹</div>
                <p>No transcripts found</p>
                <p style="margin-top: 10px; font-size: 0.9rem;">Run sync_vision_transcript.py first</p>
            </div>
        {% endif %}
    </div>

    <script>
        // Load stats for each transcript
        document.querySelectorAll('[id^="stats-"]').forEach(el => {
            const transcript = el.id.replace('stats-', '');
            fetch(`/api/stats/${transcript}`)
                .then(r => r.json())
                .then(data => {
                    el.textContent = `${data.annotated}/${data.total_segments} annotated (${data.strategic} strategic)`;
                })
                .catch(() => {
                    el.textContent = 'Error loading stats';
                });
        });
    </script>
</body>
</html>
